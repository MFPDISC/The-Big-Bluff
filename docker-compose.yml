version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: biglie_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-biglie_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: biglie_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: biglie_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-biglie_db}
      - REDIS_URL=redis://redis:6379
      - CLIENT_URL=${CLIENT_URL:-https://bigbluff.btcnews.co.za}
      - ALPHA_VANTAGE_KEY=${ALPHA_VANTAGE_KEY}
      - FRED_API_KEY=${FRED_API_KEY}
      - FMP_API_KEY=${FMP_API_KEY}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY}
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app/server
      - ./logs:/app/logs
    command: npm start

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: biglie_frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NODE_ENV=production
      - VITE_API_URL=${VITE_API_URL:-https://bigbluff.btcnews.co.za/api}
    ports:
      - "3000:4173"
    command: npm run preview -- --host 0.0.0.0 --port 4173

volumes:
  postgres_data:
  redis_data:
